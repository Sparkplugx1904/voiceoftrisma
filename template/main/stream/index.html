<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Radio Player</title>
    <style>
        body {
            margin: 0;
            background: #111;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: monospace;
        }

        audio {
            width: 500px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 24px;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ff9800;
            border-radius: 50%;
            margin-right: 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .log {
            display: none;
            font-size: 11px;
            color: #00ff00;
            background: #000;
            width: 80%;
            font-family: 'Consolas', monospace;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
        }

        .log div {
            margin-bottom: 2px;
            border-bottom: 1px solid #222;
        }

        #modeIndicator {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            padding: 5px 10px;
            border: 1px solid #333;
            border-radius: 3px;
        }

        /* Overlay hint yang muncul sebelum interaksi pertama */
        #clickHint {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            font-size: 22px;
            letter-spacing: 3px;
            color: #ff9800;
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;
            z-index: 999;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
        /* Premium Volume Meter */
        .volume-container {
            display: none;
            width: 400px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .volume-label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-align: left;
        }

        .volume-meter-wrapper {
            height: 100px;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid #222;
        }

        #visualizer {
            width: 100%;
            height: 100%;
            display: block;
        }

        .volume-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .volume-text {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
        }

        .volume-peak {
            font-size: 12px;
            color: #ff4b2b;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="clickHint">🖱 KLIK DI MANA SAJA UNTUK MULAI</div>

    <audio id="player" crossorigin="anonymous" controls></audio>

    <div class="status" id="statusContainer">
        <div class="spinner" id="loadingSpinner"></div>
        <span id="statusText">▶ PRESS SPACE / KLIK UNTUK MULAI</span>
    </div>

    <div class="log" id="debugLog"></div>

    <!-- Debug Volume Meter -->
    <div id="debugVolume" class="volume-container">
        <div class="volume-label">Frequency Spectrum Analysis</div>
        <div class="volume-meter-wrapper">
            <canvas id="visualizer"></canvas>
        </div>
        <div class="volume-stats">
            <div id="volumeValue" class="volume-text">-∞ dB</div>
            <div id="peakValue" class="volume-peak">PEAK: -∞ dB</div>
        </div>
    </div>

    <div id="modeIndicator">System: IDLE</div>

    <script>
        // --- LOGIKA PORT DINAMIS ---
        const urlParams = new URLSearchParams(window.location.search);
        const port = urlParams.get('port') || '8502';
        const streamUrl = `https://i.klikhost.com:${port}/stream`;

        const player = document.getElementById('player');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('loadingSpinner');
        const debugLog = document.getElementById('debugLog');
        const modeIndicator = document.getElementById('modeIndicator');
        const clickHint = document.getElementById('clickHint');

        let retryInterval = null;
        let userHasInteracted = false;

        // --- WAKE LOCK (ALWAYS ON DISPLAY) ---
        let wakeLock = null;

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('💡 Layar Always On: AKTIF', '#ffff00');

                    wakeLock.addEventListener('release', () => {
                        log('🌙 Layar Always On: NONAKTIF', '#ff9800');
                    });
                } catch (err) {
                    log(`❌ Gagal Wake Lock: ${err.name}, ${err.message}`, 'red');
                }
            } else {
                log('⚠️ Browser tidak mendukung Wake Lock API', 'orange');
            }
        }

        // Jika user pindah tab dan kembali, Wake Lock akan terputus. Kita perlu memintanya lagi.
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && !player.paused) {
                await requestWakeLock();
            }
        });

        // Debug mode
        const isDebug = urlParams.get('debug') === '1' || urlParams.get('debug') === 'true';
        if (isDebug) {
            debugLog.style.display = 'block';
            document.getElementById('debugVolume').style.display = 'block';
        }

        function log(msg, color = '#00ff00') {
            const time = new Date().toLocaleTimeString();
            const p = document.createElement('div');
            p.innerHTML = `<span style="color:#666;">[${time}]</span> <span style="color:${color};">${msg}</span>`;
            debugLog.prepend(p);
            if (debugLog.children.length > 50) debugLog.lastChild.remove();
        }

        // --- AUDIO ANALYSIS LOGIC ---
        let audioCtx, analyser, source, dataArray, canvas, canvasCtx;
        let peakDb = -Infinity;

        function initAudioAnalysis() {
            if (!isDebug || audioCtx) return;
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;
                
                source = audioCtx.createMediaElementSource(player);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                canvas = document.getElementById('visualizer');
                canvasCtx = canvas.getContext('2d');

                log("🎙️ Frequency Visualizer Initialized", "#00f2fe");
                draw();
            } catch (e) {
                log(`❌ Analyzer Error: ${e.message}`, "red");
            }
        }

        function draw() {
            if (!audioCtx) return;
            requestAnimationFrame(draw);
            
            analyser.getByteFrequencyData(dataArray);
            
            // Draw Visualizer
            const width = canvas.width;
            const height = canvas.height;
            canvasCtx.clearRect(0, 0, width, height);

            const barWidth = (width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                barHeight = (dataArray[i] / 255) * height;

                // Gradient color
                const hue = i / dataArray.length * 360;
                canvasCtx.fillStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
                
                canvasCtx.fillRect(x, height - barHeight, barWidth, barHeight);

                x += barWidth + 1;
            }

            // Calculate dB for the stats
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            let rms = average / 255;
            let db = rms > 0 ? 20 * Math.log10(rms) : -100;
            
            if (db > peakDb) {
                peakDb = db;
                document.getElementById('peakValue').innerText = `PEAK: ${peakDb.toFixed(1)} dB`;
            }

            document.getElementById('volumeValue').innerText = `${db.toFixed(1)} dB`;
            
            if (db > -10) {
                document.getElementById('volumeValue').style.color = "#ff4b2b";
            } else if (db > -30) {
                document.getElementById('volumeValue').style.color = "#f093fb";
            } else {
                document.getElementById('volumeValue').style.color = "#fff";
            }
        }

        function startPanicMode() {
            if (retryInterval) return;

            userHasInteracted = true;
            log(`⚠️ SERVER OFFLINE (Port: ${port}). Mencari sinyal...`, "red");

            spinner.style.display = "block";
            spinner.style.borderTopColor = "#ff9800";
            statusText.innerText = "SCANNING SERVER...";
            statusText.style.color = "#ff9800";

            modeIndicator.innerText = `System: SCANNING`;
            modeIndicator.style.borderColor = "#ff9800";
            modeIndicator.style.color = "#ff9800";

            checkServer();
            retryInterval = setInterval(checkServer, 2000);
        }

        function stopPanicMode() {
            if (retryInterval) {
                clearInterval(retryInterval);
                retryInterval = null;
                spinner.style.display = "none";
                log("🛑 Scan dihentikan.", "white");
            }
        }

        async function checkServer() {
            if (!retryInterval) return;
            const timestamp = new Date().getTime();
            log(`📡 Ping port ${port}...`, "orange");

            try {
                await fetch(`${streamUrl}?t=${timestamp}`, {
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-store'
                });

                log(`✅ Port ${port} Merespon!`, "#00ffff");
                stopPanicMode();
                playAudio();

            } catch (error) {
                log(`❌ Port ${port} masih offline.`, "gray");
            }
        }

        function playAudio() {
            const timestamp = new Date().getTime();
            player.src = `${streamUrl}?t=${timestamp}`;
            player.load();

            player.play().catch(() => {
                log("⚠️ Gagal Play otomatis, kembali scan...", "red");
                startPanicMode();
            });
        }

        // ─── AUTO-PLAY SAAT KLIK DI MANA SAJA ────────────────────────────────
        function handleFirstClick() {
            clickHint.style.display = 'none';

            if (!userHasInteracted && player.paused) {
                userHasInteracted = true;
                log(`▶ Klik terdeteksi – koneksi ke port ${port}...`, "white");

                // Panggil Wake Lock saat interaksi pertama
                requestWakeLock();
                initAudioAnalysis();

                spinner.style.display = "block";
                spinner.style.borderTopColor = "#ffffff";
                statusText.innerText = "CONNECTING...";
                statusText.style.color = "white";

                player.play().catch(() => {
                    startPanicMode();
                });
            }

            document.removeEventListener('click', handleFirstClick);
        }

        document.addEventListener('click', handleFirstClick);
        // ─────────────────────────────────────────────────────────────────────

        player.addEventListener('playing', () => {
            clickHint.style.display = 'none';
            spinner.style.display = "none";
            statusText.innerText = `🔊 PLAYING (PORT: ${port})`;
            statusText.style.color = "#4caf50";
            modeIndicator.innerText = "System: STABLE";
            modeIndicator.style.borderColor = "#4caf50";
            modeIndicator.style.color = "#4caf50";
        });

        player.addEventListener('error', () => {
            if (userHasInteracted && !player.paused && !retryInterval) {
                log("☠️ Koneksi Terputus.", "red");
                startPanicMode();
            }
        });

        // ─── SPACE BAR CONTROL ────────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (retryInterval) {
                    stopPanicMode();
                    player.pause();
                    userHasInteracted = false;
                    statusText.innerText = "⏹ SCAN STOPPED";
                    statusText.style.color = "white";
                    modeIndicator.innerText = "System: IDLE";
                    modeIndicator.style.borderColor = "#333";
                    modeIndicator.style.color = "#888";

                    if (wakeLock) {
                        wakeLock.release().then(() => wakeLock = null);
                    }
                    return;
                }

                if (!player.paused) {
                    player.pause();
                    userHasInteracted = false;
                    statusText.innerText = "⏸ PAUSED";
                    statusText.style.color = "white";
                    log("⏸ Manual Pause.", "white");

                    // Lepaskan Wake Lock jika di-pause manual
                    if (wakeLock) {
                        wakeLock.release().then(() => wakeLock = null);
                    }
                } else {
                    userHasInteracted = true;
                    log(`▶ Mencoba koneksi ke port ${port}...`, "white");

                    // Panggil Wake Lock saat play via Spacebar
                    requestWakeLock();
                    initAudioAnalysis();

                    spinner.style.display = "block";
                    spinner.style.borderTopColor = "#ffffff";
                    statusText.innerText = "CONNECTING...";

                    player.play().catch(() => {
                        startPanicMode();
                    });
                }
            }
        });
        // ─────────────────────────────────────────────────────────────────────

        // Initialize
        player.src = streamUrl;
        modeIndicator.innerText = `System: IDLE (Target Port: ${port})`;
        log(`Sistem Siap. Target: Port ${port}`, "white");
    </script>
</body>

</html>
