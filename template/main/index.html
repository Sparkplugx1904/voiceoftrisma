<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice of Trisma</title>
    <link rel="icon" href="./../assets/madyapadma.svg" type="image/png">

    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Main Application Stylesheet -->
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="sidebar-placeholder"></div>

    <!-- Main Content Layout -->
    <div class="main-content">
        <div id="navbar-placeholder"></div>

        <!-- Animated Hero Section -->
        <div class="hero-section glass-panel">
            <div class="live-badge" id="liveBadge">
                <span class="pulse"></span> LIVE NOW
            </div>
            <h1>Radio Voice of Trisma</h1>
            <p>Radio Voice of Trisma adalah sebuah radio komunitas yang berbasis di SMA Negeri 3 Denpasar.
                Dikelola oleh siswa-siswi Madyapadma Journalistic Park.</p>

            <div class="stats-row">
                <div class="stat-item">
                    <i class="fa-solid fa-headphones"></i>
                    <span id="peakListenersCount"><i class="fa-solid fa-circle-notch fa-spin"></i> Mendengarkan</span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-music"></i>
                    <span>Kualitas 128kbps</span>
                </div>
            </div>
        </div>

        <div id="player-placeholder"></div>

        <!-- Hidden Audio Element for Live Stream -->
        <audio id="mainAudio" src="http://i.klikhost.com:8502/stream" preload="none" style="display: none;"></audio>

        <script src="js/load-layout.js"></script>
        <script src="js/api.js"></script>
        <script src="js/player.js"></script>
        <script src="js/script.js"></script>
        <script>
            (function () {
                var input = document.getElementById('q');
                var btn = document.getElementById('mainSearchBtn');

                function goSearch() {
                    var q = input.value.trim();
                    if (q) {
                        window.location.href = 'archive?query=' + encodeURIComponent(q);
                    }
                }

                if (btn) btn.addEventListener('click', goSearch);
                if (input) input.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') goSearch();
                });
            })();
        </script>
    </div>
</body>

</html>
