<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Paper Spinner - Fixed Red Color</title>
    <style>
        /* ========================================================
           1. Reset & Setup Base Layout (Tema Gelap YouTube)
           ======================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f0f; /* Warna dark mode YouTube */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ========================================================
           2. Animasi & Styling Komponen Utama Spinner
           ======================================================== */
        #spinnerContainer {
            width: 28px;  /* Ukuran standar spinner YouTube */
            height: 28px;
            position: relative;
            /* Memutar seluruh container secara konstan */
            animation: container-rotate 1568ms linear infinite;
        }

        @keyframes container-rotate {
            to { transform: rotate(360deg); }
        }

        /* Styling dasar untuk setiap lapisan (Semua dikunci ke warna Merah) */
        .spinner-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            white-space: nowrap;
            color: #ffffff; /* Kunci warna utama di sini (YouTube Red) */
        }

        /* Semua layer sekarang berjalan bersamaan dengan warna yang sama,
           Hanya rotasi mekanismenya saja yang bergantian agar putaran tidak putus
        */
        .layer-1 { animation: fill-unfill-rotate 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both, layer-1-fade-in-out 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }
        .layer-2 { animation: fill-unfill-rotate 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both, layer-2-fade-in-out 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }
        .layer-3 { animation: fill-unfill-rotate 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both, layer-3-fade-in-out 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }
        .layer-4 { animation: fill-unfill-rotate 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both, layer-4-fade-in-out 5332ms cubic-bezier(0.4, 0, 0.2, 1) infinite both; }

        @keyframes fill-unfill-rotate {
            12.5% { transform: rotate(135deg); }
            25%   { transform: rotate(270deg); }
            37.5% { transform: rotate(405deg); }
            50%   { transform: rotate(540deg); }
            62.5% { transform: rotate(675deg); }
            75%   { transform: rotate(810deg); }
            87.5% { transform: rotate(945deg); }
            to    { transform: rotate(1080deg); }
        }

        /* Kontrol siklus opacity gerakan (bawaan pabrik YouTube agar putaran mulus) */
        @keyframes layer-1-fade-in-out { from, 25% { opacity: 0.99; } 26%, to { opacity: 0; } }
        @keyframes layer-2-fade-in-out { from, 25% { opacity: 0; } 26%, 50% { opacity: 0.99; } 51%, to { opacity: 0; } }
        @keyframes layer-3-fade-in-out { from, 50% { opacity: 0; } 51%, 75% { opacity: 0.99; } 76%, to { opacity: 0; } }
        @keyframes layer-4-fade-in-out { from, 75% { opacity: 0; } 76%, 100% { opacity: 0.99; } }

        /* ========================================================
           3. Logika Mekanisme Clipper (Pemotong Lingkaran) Left & Right
           ======================================================== */
        .circle-clipper {
            display: inline-block;
            position: relative;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-color: inherit;
        }

        .circle-clipper.left { float: left; }
        .circle-clipper.right { float: right; }

        /* Menggambar garis lingkaran menggunakan border */
        .circle {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            width: 200%;
            height: 100%;
            border-width: 3px; /* Ketebalan garis putaran */
            border-style: solid;
            border-color: inherit;
            border-bottom-color: transparent !important;
            border-radius: 50%;
            animation: none;
        }

        /* Potong sisi kanan lingkaran untuk clipper kiri, dan sebaliknya */
        .circle-clipper.left .circle {
            border-right-color: transparent !important;
            transform: rotate(129deg);
            animation: left-spin 1333ms cubic-bezier(0.4, 0, 0.2, 1) infinite both;
        }

        .circle-clipper.right .circle {
            left: -100%;
            border-left-color: transparent !important;
            transform: rotate(-129deg);
            animation: right-spin 1333ms cubic-bezier(0.4, 0, 0.2, 1) infinite both;
        }

        /* Efek menutup-membuka lingkaran elastis saat berputar */
        @keyframes left-spin {
            from { transform: rotate(130deg); }
            50%  { transform: rotate(-5deg); }
            to   { transform: rotate(130deg); }
        }

        @keyframes right-spin {
            from { transform: rotate(-130deg); }
            50%  { transform: rotate(5deg); }
            to   { transform: rotate(-130deg); }
        }
    </style>
</head>
<body>

    <div id="spinnerContainer">
        
        <div class="spinner-layer layer-1">
            <div class="circle-clipper left">
                <div class="circle"></div>
            </div>
            <div class="circle-clipper right">
                <div class="circle"></div>
            </div>
        </div>

        <div class="spinner-layer layer-2">
            <div class="circle-clipper left">
                <div class="circle"></div>
            </div>
            <div class="circle-clipper right">
                <div class="circle"></div>
            </div>
        </div>

        <div class="spinner-layer layer-3">
            <div class="circle-clipper left">
                <div class="circle"></div>
            </div>
            <div class="circle-clipper right">
                <div class="circle"></div>
            </div>
        </div>

        <div class="spinner-layer layer-4">
            <div class="circle-clipper left">
                <div class="circle"></div>
            </div>
            <div class="circle-clipper right">
                <div class="circle"></div>
            </div>
        </div>

    </div>

</body>
</html>
