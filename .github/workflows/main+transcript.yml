      - name: Download Python recorder & FFmpeg
        run: |
          curl -L -o record.py https://raw.githubusercontent.com/Sparkplugx1904/voiceoftrisma/main/main/record.py
          curl -L -o ffmpeg https://github.com/Sparkplugx1904/voiceoftrisma/raw/refs/heads/main/bin/ffmpeg
          curl -L -o ffprobe https://github.com/Sparkplugx1904/voiceoftrisma/raw/refs/heads/main/bin/ffprobe
          curl -L -o requirements.txt https://raw.githubusercontent.com/Sparkplugx1904/voiceoftrisma/main/requirements.txt
          chmod +x ffmpeg ffprobe

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run recorder (auto-export ENV)
        id: record
        env:
          MY_ACCESS_KEY: ${{ secrets.MY_ACCESS_KEY }}
          MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          mkdir -p recordings

          python3 -u record.py ${{ matrix.suffix }} 

      - name: Map environment vars to matrix outputs
        id: map
        run: |
          echo "[ INFO ] Global env values:"
          echo "  ARCHIVE_URL: $ARCHIVE_URL"
          echo "  ITEM_ID: $ITEM_ID"

          if [[ -z "$ARCHIVE_URL" || -z "$ITEM_ID" ]]; then
            echo "[ ERROR ] Environment variables missing!"
            exit 1
          fi

          echo "url_s0p0=$ARCHIVE_URL" >> $GITHUB_OUTPUT
          echo "id_s0p0=$ITEM_ID" >> $GITHUB_OUTPUT
          echo "[ OK ] Environment successfully mapped to job outputs."

      - name: Waiting...
        run: sleep 600

  transcribe:
    name: 🧠 Transcribe and Push to Archive
    needs: record
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pair:
          - { suffix: "s0p0", url: "${{ needs.record.outputs.url_s0p0 }}", item: "${{ needs.record.outputs.id_s0p0 }}" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: Sparkplugx1904/Whisper-CPP

      #3 Tumpukan perintah di bawah tidak boleh di ubah oleh alasan apapun bentuknya, apapun alasannya.
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        continue-on-error: true
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        continue-on-error: true
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        continue-on-error: true

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt install -y internetarchive

      - name: Transcribe audio
        run: |
          echo "[ INFO ] Transcribing audio_${{ matrix.pair.suffix }}.mp3..."
          python3 -u transcriptor_cpp.py "${{ matrix.pair.url }}" medium

      - name: Upload transcript artifact
        uses: actions/upload-artifact@v4
        with:
          name: vot-transcript-${{ matrix.pair.suffix }}
          path: transcripts/

      - name: Push transcript to Archive.org
        env:
          MY_ACCESS_KEY: ${{ secrets.MY_ACCESS_KEY }}
          MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
          ITEM_ID: ${{ matrix.pair.item }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python descriptor.py transcripts/transcript.srt -o transcripts/description.json
          python3 -u ia.py