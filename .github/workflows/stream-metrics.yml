name: Stream Metrics

on:
    workflow_dispatch:
    schedule:
        - cron: "0 5 * * *"

jobs:
    metrics:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.x'
            - name: Install dependencies
              run: pip install -r requirements.txt
            - name: Run metrics
              run: python metrics.py